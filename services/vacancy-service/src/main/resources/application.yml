spring:
  application:
    name: vacancy-service

  datasource:
    url: jdbc:postgresql://localhost:5434/vacancy_db
    username: vacancy_user
    password: vacancy_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: vacancy-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.roleradar.vacancy.event
        spring.json.value.default.type: com.roleradar.vacancy.event.VacancyUpsertedEvent
        spring.json.use.type.headers: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8082

security:
  jwt:
    issuer: http://localhost:8081
    audience: roleradar-api
    jwk-set-uri: http://localhost:8081/.well-known/jwks.json

springdoc:
  swagger-ui:
    path: /swagger-ui.html

roleradar:
  kafka:
    topics:
      vacancy-upserted: vacancy-upserted
      vacancy-upserted-dlt: vacancy-upserted-dlt
    consumer:
      retry:
        max-attempts: 3
        backoff-interval-ms: 1000
  cleanup:
    processed-events:
      cron: "0 0 * * * *"
      retention-days: 30
