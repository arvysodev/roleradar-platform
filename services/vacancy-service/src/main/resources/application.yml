spring:
  application:
    name: vacancy-service

  datasource:
    url: jdbc:postgresql://localhost:5432/roleradar_vacancy
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

security:
  jwt:
    issuer: http://localhost:8081
    audience: roleradar-api
    jwk-set-uri: http://localhost:8081/.well-known/jwks.json

springdoc:
  swagger-ui:
    path: /swagger-ui.html
