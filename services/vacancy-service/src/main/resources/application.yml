spring:
  application:
    name: vacancy-service

  datasource:
    url: jdbc:postgresql://localhost:5434/vacancy_db
    username: vacancy_user
    password: vacancy_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

security:
  jwt:
    issuer: http://localhost:8081
    audience: roleradar-api
    jwk-set-uri: http://localhost:8081/.well-known/jwks.json

springdoc:
  swagger-ui:
    path: /swagger-ui.html
