spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: auth_user
    password: auth_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false

security:
  jwt:
    secret: HVeYYjkSGsMHDHa9jkOyMD4IqS6PDW4CLFbTqRC1O3AE9kSNc7wqKxbhiOwZQ1GKV2PzqH1L8tvOAyONzPmPxV
    issuer: roleradar-auth-service
    access-token-ttl-seconds: 3600
    refresh-token-ttl-seconds: 2592000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

roleradar:
  kafka:
    topics:
      email-verification-requested: auth.email-verification-requested

server:
  port: 8081
