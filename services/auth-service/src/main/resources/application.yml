spring:
  application:
    name: auth-service

  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5433/auth_db}
    username: ${AUTH_DB_USERNAME:auth_user}
    password: ${AUTH_DB_PASSWORD:auth_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${AUTH_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    issuer: ${AUTH_JWT_ISSUER:http://localhost:8081}
    audience: ${AUTH_JWT_AUDIENCE:roleradar-api}
    key-id: ${AUTH_JWT_KEY_ID:auth-rsa-key-1}
    access-token-ttl-seconds: ${AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${AUTH_JWT_REFRESH_TOKEN_TTL_SECONDS:2592000}
    private-key-location: ${AUTH_JWT_PRIVATE_KEY_LOCATION}

roleradar:
  kafka:
    topics:
      email-verification-requested: ${AUTH_KAFKA_TOPIC_EMAIL_VERIFICATION_REQUESTED:auth.email-verification-requested}
  cleanup:
    refresh-tokens:
      cron: ${AUTH_REFRESH_TOKEN_CLEANUP_CRON:0 15 * * * *}
      expired-retention-days: ${AUTH_REFRESH_TOKEN_EXPIRED_RETENTION_DAYS:0}
      revoked-retention-days: ${AUTH_REFRESH_TOKEN_REVOKED_RETENTION_DAYS:7}

server:
  port: ${AUTH_SERVER_PORT:8081}
