spring:
  application:
    name: ingestion-service
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8083

roleradar:
  ingestion:
    remotive:
      base-url: https://remotive.com
      max-jobs-per-run: 10 # temporary var for testing only
    arbeitnow:
      base-url: https://www.arbeitnow.com
      max-jobs-per-run: 50 # temporary var for testing only
      max-pages-per-run: 3
    topics:
      vacancy-upserted: vacancy-upserted
