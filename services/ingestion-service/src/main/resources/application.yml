spring:
  application:
    name: ingestion-service

  kafka:
    bootstrap-servers: ${INGESTION_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: ${INGESTION_SERVER_PORT:8083}

roleradar:
  ingestion:
    scheduling:
      enabled: ${INGESTION_SCHEDULING_ENABLED:true}
      remotive-cron: ${INGESTION_REMOTIVE_CRON:0 0 */8 * * *}
      arbeitnow-cron: ${INGESTION_ARBEITNOW_CRON:0 0 */2 * * *}
      adzuna-cron: ${INGESTION_ADZUNA_CRON:0 0 */2 * * *}

    remotive:
      base-url: ${REMOTIVE_BASE_URL:https://remotive.com}
      max-jobs-per-run: ${REMOTIVE_MAX_JOBS_PER_RUN:10}

    arbeitnow:
      base-url: ${ARBEITNOW_BASE_URL:https://www.arbeitnow.com}
      max-jobs-per-run: ${ARBEITNOW_MAX_JOBS_PER_RUN:50}
      max-pages-per-run: ${ARBEITNOW_MAX_PAGES_PER_RUN:3}

    adzuna:
      base-url: ${ADZUNA_BASE_URL:https://api.adzuna.com/v1/api}
      app-id: ${ADZUNA_APP_ID:}
      app-key: ${ADZUNA_APP_KEY:}
      countries: ${ADZUNA_COUNTRIES:pl,de,nl,fr,es,it}
      search-terms: ${ADZUNA_SEARCH_TERMS:java developer,backend developer,software engineer}
      max-jobs-per-run: ${ADZUNA_MAX_JOBS_PER_RUN:100}
      results-per-page: ${ADZUNA_RESULTS_PER_PAGE:50}
      max-pages-per-run: ${ADZUNA_MAX_PAGES_PER_RUN:3}

    topics:
      vacancy-upserted: ${INGESTION_KAFKA_TOPIC_VACANCY_UPSERTED:vacancy-upserted}
