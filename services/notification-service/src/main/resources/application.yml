spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: ${NOTIFICATION_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID:notification-service-v1}
      auto-offset-reset: ${NOTIFICATION_KAFKA_AUTO_OFFSET_RESET:earliest}

  mail:
    host: ${NOTIFICATION_MAIL_HOST:localhost}
    port: ${NOTIFICATION_MAIL_PORT:1025}

server:
  port: ${NOTIFICATION_SERVER_PORT:8084}

roleradar:
  kafka:
    topics:
      email-verification-requested: ${KAFKA_TOPIC_EMAIL_VERIFICATION_REQUESTED:auth.email-verification-requested}
  auth:
    verify-email-base-url: ${NOTIFICATION_AUTH_VERIFY_EMAIL_BASE_URL:http://localhost:8081/api/v1/auth/verify-email}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
