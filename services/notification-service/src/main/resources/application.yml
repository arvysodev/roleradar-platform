spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-v1
      auto-offset-reset: earliest

  mail:
    host: localhost
    port: 1025

server:
  port: 8084

roleradar:
  kafka:
    topics:
      email-verification-requested: auth.email-verification-requested
  auth:
    verify-email-base-url: http://localhost:8081/api/v1/auth/verify-email