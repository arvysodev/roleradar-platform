spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: vacancy-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/vacancies/**

server:
  port: 8080

security:
  jwt:
    issuer: http://localhost:8081
    audience: roleradar-api
    jwk-set-uri: http://localhost:8081/.well-known/jwks.json
    access-token-cookie-name: access_token