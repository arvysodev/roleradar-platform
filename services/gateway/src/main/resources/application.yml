spring:
  application:
    name: gateway

server:
  port: ${GATEWAY_SERVER_PORT:8080}

security:
  jwt:
    issuer: ${GATEWAY_JWT_ISSUER:http://localhost:8081}
    audience: ${GATEWAY_JWT_AUDIENCE:roleradar-api}
    jwk-set-uri: ${GATEWAY_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}
  cookies:
    access-token-name: ${GATEWAY_ACCESS_TOKEN_COOKIE_NAME:access_token}
    refresh-token-name: ${GATEWAY_REFRESH_TOKEN_COOKIE_NAME:refresh_token}
    secure: ${GATEWAY_COOKIE_SECURE:false}
    same-site: ${GATEWAY_COOKIE_SAME_SITE:Lax}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /aggregate/auth-service/v3/api-docs
