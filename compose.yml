services:
  postgres-auth:
    image: postgres:17
    container_name: roleradar-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  postgres-vacancy:
    image: postgres:17
    container_name: roleradar-postgres-vacancy
    environment:
      POSTGRES_DB: vacancy_db
      POSTGRES_USER: vacancy_user
      POSTGRES_PASSWORD: vacancy_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_vacancy_data:/var/lib/postgresql/data

  postgres-ingestion:
    image: postgres:17
    container_name: roleradar-postgres-ingestion
    environment:
      POSTGRES_DB: ingestion_db
      POSTGRES_USER: ingestion_user
      POSTGRES_PASSWORD: ingestion_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_ingestion_data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka:4.1.0
    container_name: roleradar-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: roleradar-kafka-ui
    ports:
      - "8085:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: roleradar-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  mailpit:
    image: axllent/mailpit:latest
    container_name: roleradar-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  auth-service:
    build:
      context: ./services/auth-service
    container_name: roleradar-auth-service
    depends_on:
      - postgres-auth
      - kafka
    env_file:
      - ./.env.auth
    ports:
      - "8081:8081"
    volumes:
      - ./services/auth-service/secrets/auth/jwt-private.pem:/run/secrets/auth-jwt-private.pem:ro

  vacancy-service:
    build:
      context: ./services/vacancy-service
    container_name: roleradar-vacancy-service
    depends_on:
      - postgres-vacancy
      - kafka
      - auth-service
    env_file:
      - ./.env.vacancy
    ports:
      - "8082:8082"

  ingestion-service:
    build:
      context: ./services/ingestion-service
    container_name: roleradar-ingestion-service
    depends_on:
      - kafka
    env_file:
      - ./.env.ingestion
    ports:
      - "8083:8083"

  notification-service:
    build:
      context: ./services/notification-service
    container_name: roleradar-notification-service
    depends_on:
      - kafka
      - mailpit
      - auth-service
    env_file:
      - ./.env.notification
    ports:
      - "8084:8084"

  gateway:
    build:
      context: ./services/gateway
    container_name: roleradar-gateway
    depends_on:
      - auth-service
      - vacancy-service
    env_file:
      - ./.env.gateway
    ports:
      - "8080:8080"

volumes:
  postgres_auth_data:
  postgres_vacancy_data:
  postgres_ingestion_data:
  kafka_data: